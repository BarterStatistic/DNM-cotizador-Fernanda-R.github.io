# Configuración de Netlify para Cotizador Prospect Team
# Documentación: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."

# Headers de seguridad globales
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "SAMEORIGIN"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=()"

# Caché del HTML: nunca cachear (para que actualizaciones se vean al instante)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Caché del favicon: largo
[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Página 404 personalizada
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404
